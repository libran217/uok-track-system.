<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UoK - Report Item</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --uok-green: #1a8a42; }
        body { background: #f4f7f6; padding-top: 20px; }
        .card { border-radius: 15px; border: none; }
        .btn-success { background: var(--uok-green); border: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card shadow-lg mx-auto" style="max-width: 600px;">
            <div class="card-header bg-white pt-4 border-0 text-center">
                <h4 class="fw-bold text-success">UoK REPORTING PORTAL</h4>
                <p class="text-muted small">Please provide accurate details for effective communication</p>
            </div>
            <div class="card-body px-4 pb-4">
                <form action="/report-item" method="POST" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-bold">Item Name</label>
                            <input type="text" name="item_name" class="form-control" placeholder="e.g. HP Laptop, Student ID" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Report Type</label>
                            <select name="status" class="form-select">
                                <option value="lost">Lost Item</option>
                                <option value="found">Found Item</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Category</label>
                            <select name="category" class="form-select" required>
                                <option value="Electronics">Electronics</option>
                                <option value="School IDs">School IDs</option>
                                <option value="Books">Books/Stationery</option>
                                <option value="Clothes">Clothes/Bag</option>
                                <option value="Wallets">Wallets/Keys</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold">Location Last Seen/Found</label>
                            <input type="text" name="location" class="form-control" placeholder="e.g. Library, Science Lab" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold">Description</label>
                            <textarea name="description" class="form-control" rows="2" placeholder="Color, brand, unique marks..."></textarea>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold">Evidence Photo</label>
                            <input type="file" name="item_image" class="form-control" accept="image/*">
                            <small class="text-muted">Take a photo now or upload from storage.</small>
                        </div>

                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-success w-100 py-2 fw-bold">
                                <i class="fas fa-paper-plane me-2"></i> SUBMIT TO DATABASE
                            </button>
                            <a href="index.html" class="btn btn-light w-100 mt-2">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
